# Local Supabase configuration for Altur backend development.
# Reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "altur_backend"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[storage]
enabled = true
file_size_limit = "500MiB"

[storage.buckets.call-audio]
public = false
file_size_limit = "500MiB"
allowed_mime_types = [
  "audio/mpeg",
  "audio/mp3",
  "audio/wav",
  "audio/wave",
  "audio/x-wav",
]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

[realtime]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
